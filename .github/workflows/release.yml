name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- Linux .deb
  build-linux-deb:
    name: Build .deb (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 libdbus-1-3 \
            ruby ruby-dev rubygems build-essential

      - name: Install fpm (Linux package builder)
        run: sudo gem install --no-document fpm

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel — bundled installers don't ship a CUDA
          # runtime, and the GPU wheels are ~10x bigger.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" pyinstaller

      - name: Bundle with PyInstaller
        run: pyinstaller --noconfirm dicom-viewer.spec

      - name: Stage .deb tree
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$(pwd)/deb-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/opt/dicom-viewer"
          mkdir -p "$STAGE/usr/bin"
          mkdir -p "$STAGE/usr/share/applications"
          mkdir -p "$STAGE/usr/share/mime/packages"
          cp -r dist/dicom-viewer/* "$STAGE/opt/dicom-viewer/"
          # Wrapper executable on $PATH so `dicom-viewer` works from a terminal.
          cat > "$STAGE/usr/bin/dicom-viewer" <<'SH'
          #!/bin/sh
          exec /opt/dicom-viewer/dicom-viewer "$@"
          SH
          chmod +x "$STAGE/usr/bin/dicom-viewer"
          # Desktop entry — point Exec at the wrapper.
          sed 's|__EXEC__|/usr/bin/dicom-viewer|g' scripts/dicom-viewer.desktop \
            > "$STAGE/usr/share/applications/dicom-viewer.desktop"
          cp scripts/dicom-viewer.xml "$STAGE/usr/share/mime/packages/dicom-viewer.xml"
          # App icon — install into the hicolor theme at each generated size
          # so `Icon=dicom-viewer` in the .desktop is resolved by any DE.
          for sz in 16 32 48 64 128 256 512; do
            dest="$STAGE/usr/share/icons/hicolor/${sz}x${sz}/apps"
            mkdir -p "$dest"
            cp "assets/icon-${sz}.png" "$dest/dicom-viewer.png"
          done
          mkdir -p "$STAGE/usr/share/icons/hicolor/scalable/apps"
          cp assets/icon.svg "$STAGE/usr/share/icons/hicolor/scalable/apps/dicom-viewer.svg"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "STAGE=$STAGE"     >> "$GITHUB_ENV"

      - name: Build .deb with fpm
        run: |
          fpm -s dir -t deb \
            -n dicom-viewer \
            -v "$VERSION" \
            --description "DICOM viewer with 3D-printable STL export." \
            --license MIT \
            --maintainer "Aaron <agly95@gmail.com>" \
            --url "https://github.com/${GITHUB_REPOSITORY}" \
            --after-install <(echo 'update-mime-database /usr/share/mime || true; update-desktop-database /usr/share/applications || true; gtk-update-icon-cache /usr/share/icons/hicolor || true') \
            --depends "libegl1" --depends "libgl1" --depends "libxkbcommon-x11-0" \
            --depends "libxcb-cursor0" --depends "libxcb-icccm4" --depends "libxcb-image0" \
            --depends "libxcb-keysyms1" --depends "libxcb-randr0" --depends "libxcb-render-util0" \
            --depends "libxcb-shape0" --depends "libxcb-xinerama0" --depends "libxcb-xkb1" \
            --depends "libdbus-1-3" \
            -C "$STAGE" .

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: dicom-viewer-deb
          path: '*.deb'

  # ------------------------------------------------------------ Windows .exe
  build-windows-setup:
    name: Build setup.exe (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel — bundled installers don't ship a CUDA
          # runtime, and the GPU wheels are ~10x bigger.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" pyinstaller

      - name: Bundle with PyInstaller
        run: pyinstaller --noconfirm dicom-viewer.spec

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          # `choco install nsis` puts makensis in C:\Program Files (x86)\NSIS\.
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = "makensis" }
          & $nsis "/DAPP_VERSION=$version" scripts\dicom-viewer.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: dicom-viewer-windows
          path: dist/*setup.exe

  # --------------------------------------------------------------- macOS .dmg
  build-macos-dmg:
    name: Build .dmg (macOS)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" pyinstaller dmgbuild

      - name: Bundle with PyInstaller
        run: pyinstaller --noconfirm dicom-viewer.spec

      - name: Build .dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          dmgbuild -s scripts/dmg-settings.py "DICOM Viewer" "dist/dicom-viewer-${VERSION}.dmg"

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: dicom-viewer-dmg
          path: dist/*.dmg

  # ----------------------------------------------------- collect + publish
  publish-release:
    name: Publish GitHub Release
    needs: [build-linux-deb, build-windows-setup, build-macos-dmg]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show what we collected
        run: ls -la artifacts/* && find artifacts -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/dicom-viewer-deb/*.deb
            artifacts/dicom-viewer-windows/*.exe
            artifacts/dicom-viewer-dmg/*.dmg
